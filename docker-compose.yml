version: '3'
services:
  app:
    build: .
    container_name: prompt_manager
    environment:
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - ${HOST_PORT}:5000
    volumes:
      - ${DIR_BASE}/prompt_manager/static/uploads:/app/static/uploads
      - ${DIR_BASE}/prompt_manager/database:/app/database

    restart: unless-stopped
